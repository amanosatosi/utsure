name: windows-msys2

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    env:
      UTSURE_CMAKE_BUILD_TYPE: Release
      UTSURE_MSYS2_PREFIX: "/ucrt64"
      UTSURE_TOOLCHAIN_ID_PREFIX: "ucrt64-gcc"
      UTSURE_FFMPEG_SERIES: "7.1"
      UTSURE_FFMPEG_VERSION: "7.1.2"
      UTSURE_FFMS2_REF: "25cef14386fcaaa58ee547065deee8f6e82c56a2"
      UTSURE_FFMPEG_CONFIGURE_FLAGS: >-
        --enable-gpl --enable-libx264 --enable-libx265 --enable-shared --disable-static
        --disable-debug --disable-doc --disable-ffplay --disable-programs --enable-ffmpeg --enable-ffprobe
      UTSURE_LIBASSMOD_REF: "88a338192faf50505eb4cedfe7d1320265f1081f"
      UTSURE_PORTABLE_BUNDLE_NAME: encoder-windows-x64-portable

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            autoconf
            automake
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-freetype
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-fribidi
            mingw-w64-ucrt-x86_64-harfbuzz
            mingw-w64-ucrt-x86_64-libx264
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-nasm
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-multimedia
            mingw-w64-ucrt-x86_64-qt6-svg
            mingw-w64-ucrt-x86_64-x265
            mingw-w64-ucrt-x86_64-zlib
            curl
            libtool
            make

      # TODO(2026-05-01): Re-add the FFmpeg actions/cache restore/save steps around this build
      # once the temporary cache disablement is no longer needed.
      - name: Build FFmpeg
        run: ./scripts/ci/windows-msys2-build-ffmpeg.sh

      - name: Build libassmod
        run: ./scripts/ci/windows-msys2-build-libassmod.sh

      - name: Build FFMS2
        run: ./scripts/ci/windows-msys2-build-ffms2.sh

      - name: Audit dependencies
        run: ./scripts/ci/windows-msys2-dependency-audit.sh

      - name: Configure, build, and smoke test
        run: ./scripts/ci/windows-msys2-build.sh

      - name: Package portable bundle
        run: ./scripts/ci/windows-msys2-package-portable.sh

      - name: Upload portable artifact
        uses: actions/upload-artifact@v6
        with:
          name: encoder-windows-x64-portable
          if-no-files-found: error
          path: artifacts/encoder-windows-x64-portable.zip

  subtitle-asan:
    runs-on: windows-latest
    env:
      UTSURE_CMAKE_BUILD_TYPE: Debug
      UTSURE_MSYS2_PREFIX: "/clang64"
      UTSURE_TOOLCHAIN_ID_PREFIX: "clang64-clang"
      UTSURE_FFMPEG_SERIES: "7.1"
      UTSURE_FFMPEG_VERSION: "7.1.2"
      UTSURE_FFMS2_REF: "25cef14386fcaaa58ee547065deee8f6e82c56a2"
      UTSURE_FFMPEG_CONFIGURE_FLAGS: >-
        --enable-gpl --enable-libx264 --enable-libx265 --enable-shared --disable-static
        --disable-debug --disable-doc --disable-ffplay --disable-programs --enable-ffmpeg --enable-ffprobe
      UTSURE_LIBASSMOD_REF: "88a338192faf50505eb4cedfe7d1320265f1081f"
      UTSURE_BUILD_APP: "OFF"
      UTSURE_RUN_APP_SMOKE_TEST: "OFF"
      UTSURE_CMAKE_EXTRA_ARGS: "-DUTSURE_ENABLE_ADDRESS_SANITIZER=ON"
      UTSURE_CTEST_REGEX: "utsure\\.core\\.subtitles\\.(compositor\\.|burn_in\\.stress\\.)"
      CC: clang
      CXX: clang++
      AR: llvm-ar
      NM: llvm-nm
      RANLIB: llvm-ranlib
      STRIP: llvm-strip
      WINDRES: llvm-windres

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            git
            autoconf
            automake
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-compiler-rt
            mingw-w64-clang-x86_64-freetype
            mingw-w64-clang-x86_64-fribidi
            mingw-w64-clang-x86_64-harfbuzz
            mingw-w64-clang-x86_64-libx264
            mingw-w64-clang-x86_64-meson
            mingw-w64-clang-x86_64-nasm
            mingw-w64-clang-x86_64-ninja
            mingw-w64-clang-x86_64-pkgconf
            mingw-w64-clang-x86_64-x265
            mingw-w64-clang-x86_64-zlib
            curl
            libtool
            make

      # TODO(2026-05-01): Re-add the FFmpeg actions/cache restore/save steps around this build
      # once the temporary cache disablement is no longer needed.
      - name: Build FFmpeg
        run: ./scripts/ci/windows-msys2-build-ffmpeg.sh

      - name: Build libassmod
        run: ./scripts/ci/windows-msys2-build-libassmod.sh

      - name: Build FFMS2
        run: ./scripts/ci/windows-msys2-build-ffms2.sh

      - name: Audit dependencies
        run: ./scripts/ci/windows-msys2-dependency-audit.sh

      - name: Build and run subtitle ASan stress coverage
        run: ./scripts/ci/windows-msys2-build.sh
